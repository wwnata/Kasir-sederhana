<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasir Pintar</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Link ke file CSS eksternal -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 font-sans text-gray-800 h-screen flex flex-col sm:max-w-md sm:mx-auto sm:border-x sm:shadow-xl">

    <!-- Header -->
    <div class="bg-gray-900 text-white p-4 text-center shrink-0 shadow-md z-10">
        <h1 class="text-xl font-bold tracking-wider">KASIR OFFLINE</h1>
        <p class="text-gray-400 text-xs mt-1">Simpel & Cepat</p>
    </div>

    <!-- Konten Utama (Bisa di-scroll) -->
    <div class="flex-1 overflow-y-auto p-4 space-y-4 pb-6">
        
        <!-- Bubur (Mangkok Biasa) -->
        <div class="flex items-center p-3 bg-white rounded-2xl shadow-sm border border-gray-100">
            <div class="p-2 bg-blue-100 rounded-xl mr-3 text-blue-600 shrink-0">
                <svg viewBox="0 0 100 100" class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M 15 35 C 15 45, 15 70, 50 70 C 85 70, 85 45, 85 35" />
                    <ellipse cx="50" cy="35" rx="35" ry="12" />
                    <path d="M 35 70 L 35 80 L 65 80 L 65 70" />
                </svg>
            </div>
            <div class="flex-1">
                <h3 class="font-bold text-gray-800 text-sm">Bubur</h3>
                <p class="text-xs font-semibold text-gray-500">12k</p>
            </div>
            <div class="flex items-center space-x-3 bg-gray-50 rounded-full p-1 border border-gray-200">
                <button onclick="updateCount(0, -1)" class="w-8 h-8 rounded-full bg-white shadow flex items-center justify-center text-xl font-bold text-gray-600 active:scale-90 transition-transform">-</button>
                <span id="count-0" class="w-5 text-center font-bold text-lg">0</span>
                <button onclick="updateCount(0, 1)" class="w-8 h-8 rounded-full bg-blue-600 shadow flex items-center justify-center text-xl font-bold text-white active:scale-90 transition-transform">+</button>
            </div>
        </div>

        <!-- Bubur Setengah (Mangkok S) -->
        <div class="flex items-center p-3 bg-white rounded-2xl shadow-sm border border-gray-100">
            <div class="p-2 bg-orange-100 rounded-xl mr-3 text-orange-600 shrink-0">
                <svg viewBox="0 0 100 100" class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M 15 35 C 15 45, 15 70, 50 70 C 85 70, 85 45, 85 35" />
                    <ellipse cx="50" cy="35" rx="35" ry="12" />
                    <path d="M 35 70 L 35 80 L 65 80 L 65 70" />
                    <text x="50" y="60" font-size="28" font-weight="900" text-anchor="middle" fill="currentColor" stroke="none" font-family="sans-serif">S</text>
                </svg>
            </div>
            <div class="flex-1">
                <h3 class="font-bold text-gray-800 text-sm">Bubur Setengah</h3>
                <p class="text-xs font-semibold text-gray-500">8k</p>
            </div>
            <div class="flex items-center space-x-3 bg-gray-50 rounded-full p-1 border border-gray-200">
                <button onclick="updateCount(1, -1)" class="w-8 h-8 rounded-full bg-white shadow flex items-center justify-center text-xl font-bold text-gray-600 active:scale-90 transition-transform">-</button>
                <span id="count-1" class="w-5 text-center font-bold text-lg">0</span>
                <button onclick="updateCount(1, 1)" class="w-8 h-8 rounded-full bg-orange-500 shadow flex items-center justify-center text-xl font-bold text-white active:scale-90 transition-transform">+</button>
            </div>
        </div>

        <!-- Sate -->
        <div class="flex items-center p-3 bg-white rounded-2xl shadow-sm border border-gray-100">
            <div class="p-2 bg-red-100 rounded-xl mr-3 text-red-600 shrink-0">
                <svg viewBox="0 0 100 100" class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <g transform="translate(15, -10) rotate(45 50 50)">
                        <line x1="30" y1="20" x2="30" y2="85" stroke-width="2" />
                        <path d="M 22 35 Q 30 30 38 35 Q 38 45 30 50 Q 22 45 22 35 Z" fill="currentColor" />
                        <path d="M 22 50 Q 30 45 38 50 Q 38 60 30 65 Q 22 60 22 50 Z" fill="currentColor" />
                        <path d="M 22 65 Q 30 60 38 65 Q 38 75 30 80 Q 22 75 22 65 Z" fill="currentColor" />
                        <line x1="50" y1="20" x2="50" y2="85" stroke-width="2" />
                        <path d="M 42 35 Q 50 30 58 35 Q 58 45 50 50 Q 42 45 42 35 Z" fill="currentColor" />
                        <path d="M 42 50 Q 50 45 58 50 Q 58 60 50 65 Q 42 60 42 50 Z" fill="currentColor" />
                        <path d="M 42 65 Q 50 60 58 65 Q 58 75 50 80 Q 42 75 42 65 Z" fill="currentColor" />
                        <line x1="70" y1="20" x2="70" y2="85" stroke-width="2" />
                        <path d="M 62 35 Q 70 30 78 35 Q 78 45 70 50 Q 62 45 62 35 Z" fill="currentColor" />
                        <path d="M 62 50 Q 70 45 78 50 Q 78 60 70 65 Q 62 60 62 50 Z" fill="currentColor" />
                        <path d="M 62 65 Q 70 60 78 65 Q 78 75 70 80 Q 62 75 62 65 Z" fill="currentColor" />
                    </g>
                </svg>
            </div>
            <div class="flex-1">
                <h3 class="font-bold text-gray-800 text-sm">Sate Tambahan</h3>
                <p class="text-xs font-semibold text-gray-500">3k</p>
            </div>
            <div class="flex items-center space-x-3 bg-gray-50 rounded-full p-1 border border-gray-200">
                <button onclick="updateCount(2, -1)" class="w-8 h-8 rounded-full bg-white shadow flex items-center justify-center text-xl font-bold text-gray-600 active:scale-90 transition-transform">-</button>
                <span id="count-2" class="w-5 text-center font-bold text-lg">0</span>
                <button onclick="updateCount(2, 1)" class="w-8 h-8 rounded-full bg-red-500 shadow flex items-center justify-center text-xl font-bold text-white active:scale-90 transition-transform">+</button>
            </div>
        </div>

        <hr class="border-gray-200 my-4" />

        <!-- Area Kalkulasi (Selalu Terlihat) -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-4">
            
            <!-- Total -->
            <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-200">
                <span class="text-gray-500 font-bold text-sm">Total Tagihan</span>
                <span class="text-2xl font-black text-gray-900" id="total-display">0k</span>
            </div>

            <!-- Input Uang -->
            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-600 ml-1">Uang Diterima (Ribuan)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400 font-bold text-lg">Rp</span>
                    <!-- type="tel" memunculkan keyboard angka besar di HP -->
                    <input 
                        type="tel" 
                        id="payment-input"
                        placeholder="0"
                        class="w-full pl-10 pr-10 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl font-black text-xl focus:outline-none focus:border-gray-900 focus:bg-white transition-colors"
                    />
                    <span class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 font-bold text-lg">.000</span>
                </div>
                
                <!-- Tombol Uang Cepat -->
                <div class="flex gap-2 pt-1">
                    <button onclick="setQuickMoney(20)" class="flex-1 py-2 bg-gray-100 text-gray-700 font-bold text-sm rounded-lg active:bg-gray-200 transition-colors">20k</button>
                    <button onclick="setQuickMoney(50)" class="flex-1 py-2 bg-gray-100 text-gray-700 font-bold text-sm rounded-lg active:bg-gray-200 transition-colors">50k</button>
                    <button onclick="setQuickMoney(100)" class="flex-1 py-2 bg-gray-100 text-gray-700 font-bold text-sm rounded-lg active:bg-gray-200 transition-colors">100k</button>
                    <button onclick="setQuickMoney('PAS')" class="flex-1 py-2 bg-blue-100 text-blue-700 font-bold text-sm rounded-lg active:bg-blue-200 transition-colors">Pas</button>
                </div>
            </div>

            <!-- Area Kembalian -->
            <div id="change-area" class="hidden p-3 rounded-xl border flex flex-col items-center justify-center">
                <span id="change-label" class="text-xs font-bold uppercase tracking-wider mb-1">Kembalian</span>
                <span id="change-display" class="text-3xl font-black">0k</span>
            </div>
        </div>
    </div>

    <!-- Tombol Reset Bawah -->
    <div class="p-4 bg-white border-t border-gray-200 shrink-0">
        <button 
            onclick="resetAll()"
            class="w-full py-4 rounded-xl bg-gray-900 text-white font-bold text-lg active:bg-gray-800 active:scale-[0.98] transition-all flex items-center justify-center space-x-2"
        >
            <span>Selesai & Reset Kasir</span>
        </button>
    </div>

    <!-- Link ke file JavaScript eksternal -->
    <script src="script.js"></script>
</body>
</html>
